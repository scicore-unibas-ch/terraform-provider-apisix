services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    command: etcd --advertise-client-urls http://0.0.0.0:2379 --listen-client-urls http://0.0.0.0:2379
    volumes:
      - etcd-data:/etcd-data
    environment:
      - ETCD_DATA_DIR=/etcd-data
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 3

  apisix:
    image: apache/apisix:3.16.0-debian
    depends_on:
      etcd:
        condition: service_healthy
    environment:
      - APISIX_STAND_ALONE=false
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/ssl:/etc/apisix/ssl:ro
    ports:
      - "9180:9180"  # Admin API
      - "9080:9080"  # HTTP
      - "9443:9443"  # HTTPS
      - "9091:9091"  # Prometheus
    healthcheck:
      test: ["CMD-SHELL", "apisix healthcheck 2>/dev/null || (curl -f -s -o /dev/null -w '%{http_code}' -H 'X-API-KEY: test123456789' http://127.0.0.1:9180/apisix/admin/ | grep -q '200')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

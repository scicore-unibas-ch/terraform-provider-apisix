name: Acceptance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  acceptance:
    name: Acceptance Tests (APISIX ${{ matrix.apisix_version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - apisix_version: "3.16.0"
            etcd_version: "3.5.9"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: opentofu/setup-opentofu@v2

      # -----------------------------------------------------------------------
      # Start the APISIX cluster from pre-built Docker images
      # -----------------------------------------------------------------------
      - name: Start APISIX cluster (initial)
        working-directory: tests/
        run: |
          docker compose up -d
          sleep 10

      - name: Wait for APISIX to be ready
        run: |
          echo "Waiting for APISIX Admin API..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9180/apisix/admin/routes -H "X-API-KEY: test123456789" &>/dev/null; then
              echo "APISIX ready."
              break
            fi
            echo "  attempt $i/60 — sleeping 5s"
            sleep 5
          done

      # -----------------------------------------------------------------------
      # Build the provider and run acceptance tests
      # -----------------------------------------------------------------------
      - name: Build provider binary
        run: go build -o terraform-provider-apisix .

      # Run acceptance tests for each resource
      # Each test creates its own .tofurc and restarts APISIX for clean state
      - name: Run upstream acceptance tests
        working-directory: tests/acceptance/upstream
        run: ./test.sh

      - name: Run route acceptance tests
        working-directory: tests/acceptance/route
        run: ./test.sh

      - name: Run service acceptance tests
        working-directory: tests/acceptance/service
        run: ./test.sh

      - name: Run consumer acceptance tests
        working-directory: tests/acceptance/consumer
        run: ./test.sh

      - name: Run consumer_group acceptance tests
        working-directory: tests/acceptance/consumer_group
        run: ./test.sh

      - name: Run plugin_config acceptance tests
        working-directory: tests/acceptance/plugin_config
        run: ./test.sh

      - name: Run global_rule acceptance tests
        working-directory: tests/acceptance/global_rule
        run: ./test.sh

      # SSL tests are skipped due to SSL proxy configuration complexity
      # They can be enabled later when needed

      # -----------------------------------------------------------------------
      # Cleanup
      # -----------------------------------------------------------------------
      - name: Stop APISIX cluster
        if: always()
        working-directory: tests/
        run: docker compose down -v
